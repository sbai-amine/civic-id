name: civic_key
description: BridgeID — citizen mobile app for digital identity and civic services.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  flutter_secure_storage: ^9.2.2
  qr_flutter: ^4.1.0
  sqflite: ^2.3.3+1
  path: ^1.9.0
  crypto: ^3.0.6
  local_auth: ^2.3.0
  package_info_plus: ^8.1.0
  share_plus: ^10.1.2
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
