name: BridgeID CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bridgeid
          POSTGRES_PASSWORD: bridgeid
          POSTGRES_DB: bridgeid
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bridgeid -d bridgeid"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            admin-web/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Run backend migration
        run: npm run migrate
        working-directory: backend
        env:
          DATABASE_URL: postgresql://bridgeid:bridgeid@localhost:5432/bridgeid

      - name: Run backend tests
        run: npm test
        working-directory: backend
        env:
          DATABASE_URL: postgresql://bridgeid:bridgeid@localhost:5432/bridgeid

      - name: Install admin-web dependencies
        run: npm ci
        working-directory: admin-web

      - name: Build admin-web
        run: npm run build
        working-directory: admin-web

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Citizen app dependencies
        run: flutter pub get

      - name: Citizen app analyze
        run: flutter analyze

      - name: Citizen app tests
        run: flutter test

      - name: Verifier app dependencies
        run: flutter pub get
        working-directory: agent_app

      - name: Verifier app analyze
        run: flutter analyze
        working-directory: agent_app

      - name: Verifier app tests
        run: flutter test
        working-directory: agent_app

  deploy-admin-web:
    name: Deploy Admin Web (GitHub Pages)
    runs-on: ubuntu-latest
    needs: quality-checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      pages: write
      id-token: write
      contents: read

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin-web/package-lock.json

      - name: Install admin-web dependencies
        run: npm ci
        working-directory: admin-web

      - name: Build admin-web for production
        run: npm run build
        working-directory: admin-web
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_ADMIN_API_KEY: ${{ secrets.VITE_ADMIN_API_KEY }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: admin-web/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
